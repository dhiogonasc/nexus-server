services:
  db:
    container_name: nexus-db
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGPORT: ${DB_PORT}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -p ${DB_PORT} -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - server

  server:
    container_name: nexus-server
    build: .
    ports:
      - "${SERVER_PORT}:8080"
    secrets:
      - jwt_public_key
      - jwt_private_key
    environment:
      JWT_PRIVATE_KEY: file:/run/secrets/jwt_private_key
      JWT_PUBLIC_KEY: file:/run/secrets/jwt_public_key
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:${DB_PORT}/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_FLYWAY_ENABLED: "true"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - server

secrets:
  jwt_private_key:
    file: ./certs/private.key
  jwt_public_key:
    file: ./certs/public.key

networks:
  server:

volumes:
  postgres_data:
