opencollection: 1.0.0

info:
  name: Nexus RPG API
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

docs:
  content: Coleção organizada para o desenvolvimento do Nexus RPG, com herança de autenticação e scripts de automação.
  type: text/markdown
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
    presets:
      request:
        type: http
