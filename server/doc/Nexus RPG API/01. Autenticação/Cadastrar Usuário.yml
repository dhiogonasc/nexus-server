info:
  name: Cadastrar Usuário
  type: http
  seq: 1

http:
  method: POST
  url: "{{server.url}}/auth/register"
  body:
    type: json
    data: |-
      {
        "username": "username",
        "email": "email@email.com",
        "password": "123456"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
