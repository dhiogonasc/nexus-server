info:
  name: Login
  type: http
  seq: 2

http:
  method: POST
  url: "{{server.url}}/auth/login"
  body:
    type: json
    data: |-
      {
          "email": "email@email.com",
          "password": "123456"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const login = res.getBody();
        bru.setEnvVar("access.token", login.accessToken);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
